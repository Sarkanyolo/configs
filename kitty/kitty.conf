# Font (use a Nerd Font with ligatures for LazyVim icons & LSP symbols)
font_family      FiraCode Nerd Font
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size          10
enable_ligatures   yes

# Performance / latency
input_delay        0
repaint_delay      2
sync_to_monitor    no
remember_window_size yes

# Tabs
tab_bar_style      powerline
tab_powerline_style slanted
tab_bar_edge       bottom
tab_bar_min_tabs   1

# Remote control (for neovim/kitty integration)
allow_remote_control yes
listen_on unix:/tmp/kitty

# Colors
foreground #d0d0d0
background #232629

color0  #31363b
color1  #ed1515
color2  #11d116
color3  #f67400
color4  #1d99f3
color5  #9b59b6
color6  #1abc9c
color7  #eff0f1

color8  #7f8c8d
color9  #f44e4e
color10 #2ecc71
color11 #fdbc4b
color12 #3daee9
color13 #8e44ad
color14 #16a085
color15 #fcfcfc

cursor   #fcfcfc
selection_background #3daee9
selection_foreground #232629

